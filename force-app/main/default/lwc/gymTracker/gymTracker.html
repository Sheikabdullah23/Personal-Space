<!-- force-app/main/default/lwc/gymTracker/gymTracker.html -->
<template>
    <div class="gym-root">

        <!-- ══ HEADER ══ -->
        <div class="gym-header">
            <div class="gym-header-left">
                <div class="gym-logo">🏋️</div>
                <div class="gym-header-text">
                    <div class="gym-eyebrow">Personal Fitness</div>
                    <div class="gym-title">Gym Attendance Tracker</div>
                </div>
            </div>
            <button class="add-btn" onclick={openModal} title="Log Today's Workout">
                <span class="add-icon">＋</span>
                <span class="add-label">Log Workout</span>
            </button>
        </div>

        <!-- ══ STATS BAR ══ -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-num">{totalSessions}</div>
                <div class="stat-label">Total Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-num">{totalHours}h</div>
                <div class="stat-label">Total Hours</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-icon">🔥</div>
                <div class="stat-num">{currentStreak}</div>
                <div class="stat-label">Day Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📆</div>
                <div class="stat-num">{thisMonthCount}</div>
                <div class="stat-label">This Month</div>
            </div>
        </div>

        <!-- ══ MILESTONE BADGES ══ -->
        <div class="milestones-row">
            <template for:each={milestones} for:item="m">
                <div key={m.label} class={m.cls} title={m.title}>
                    <span class="badge-icon">{m.icon}</span>
                    <span class="badge-label">{m.label}</span>
                </div>
            </template>
        </div>

        <!-- ══ SEARCH & FILTER BAR ══ -->
        <div class="filter-bar">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input
                    class="search-input"
                    type="text"
                    placeholder="Search by comments or workout type..."
                    value={searchTerm}
                    onchange={handleSearch}/>
                <template lwc:if={searchTerm}>
                    <button class="clear-btn" onclick={clearSearch}>✕</button>
                </template>
            </div>
            <div class="date-filters">
                <input class="date-input" type="date" value={filterFrom} onchange={handleFilterFrom} title="From date"/>
                <span class="date-sep">→</span>
                <input class="date-input" type="date" value={filterTo} onchange={handleFilterTo} title="To date"/>
                <button class="clear-filter-btn" onclick={clearFilters} title="Clear filters">↺</button>
            </div>
            <div class="type-filter">
                <select class="type-select" onchange={handleTypeFilter} value={filterType}>
                    <option value="">All Types</option>
                    <option value="Strength">💪 Strength</option>
                    <option value="Cardio">🏃 Cardio</option>
                    <option value="Yoga">🧘 Yoga</option>
                    <option value="Mixed">⚡ Mixed</option>
                    <option value="HIIT">🔥 HIIT</option>
                    <option value="Rest Day">😴 Rest Day</option>
                </select>
            </div>
            <div class="result-count">{filteredCount} entries</div>
        </div>

        <!-- ══ TABLE ══ -->
        <div class="table-wrap">
            <template lwc:if={isLoading}>
                <div class="table-loading">
                    <div class="spinner"></div>
                    <span>Loading logs...</span>
                </div>
            </template>

            <template lwc:else>
                <template lwc:if={hasLogs}>

                    <!-- Desktop Table -->
                    <div class="desktop-table">
                        <table class="gym-table">
                            <thead>
                                <tr>
                                    <th class="th-num">#</th>
                                    <th class="th-sortable" data-col="Log_Date__c" onclick={handleSort}>
                                        Date {sortIcons.Log_Date__c}
                                    </th>
                                    <th class="th-sortable" data-col="Duration__c" onclick={handleSort}>
                                        Duration {sortIcons.Duration__c}
                                    </th>
                                    <th class="th-sortable" data-col="Workout_Type__c" onclick={handleSort}>
                                        Type {sortIcons.Workout_Type__c}
                                    </th>
                                    <th>Mood</th>
                                    <th>Comments</th>
                                    <th class="th-action">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={displayedLogs} for:item="log">
                                    <tr key={log.Id} class={log.rowCls}>
                                        <td class="td-num">{log.rowNum}</td>
                                        <td class="td-date">
                                            <span class="date-badge">{log.formattedDate}</span>
                                        </td>
                                        <td class="td-duration">
                                            <span class="duration-chip">{log.Duration__c} min</span>
                                        </td>
                                        <td><span class={log.typeCls}>{log.Workout_Type__c}</span></td>
                                        <td><span class={log.moodCls}>{log.moodLabel}</span></td>
                                        <td class="td-comments">{log.Comments__c}</td>
                                        <td class="td-action">
                                            <button class="delete-btn"
                                                data-id={log.Id}
                                                onclick={handleDeleteClick}
                                                title="Delete">🗑️</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <!-- Mobile Cards -->
                    <div class="mobile-cards">
                        <template for:each={displayedLogs} for:item="log">
                            <div key={log.Id} class="log-card">
                                <div class="log-card-top">
                                    <div class="log-card-left">
                                        <span class="date-badge">{log.formattedDate}</span>
                                        <span class="log-card-num">#{log.rowNum}</span>
                                    </div>
                                    <button class="delete-btn"
                                        data-id={log.Id}
                                        onclick={handleDeleteClick}
                                        title="Delete">🗑️</button>
                                </div>
                                <div class="log-card-chips">
                                    <span class="duration-chip">{log.Duration__c} min</span>
                                    <span class={log.typeCls}>{log.Workout_Type__c}</span>
                                    <span class={log.moodCls}>{log.moodLabel}</span>
                                </div>
                                <template lwc:if={log.Comments__c}>
                                    <div class="log-card-comments">{log.Comments__c}</div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <!-- Pagination -->
                    <div class="pagination">
                        <button class="page-btn" onclick={prevPage} disabled={isPrevDisabled}>‹ Prev</button>
                        <span class="page-info">Page {currentPage} of {totalPages}</span>
                        <button class="page-btn" onclick={nextPage} disabled={isNextDisabled}>Next ›</button>
                    </div>

                </template>

                <template lwc:else>
                    <div class="empty-state">
                        <div class="empty-icon">🏋️</div>
                        <div class="empty-title">No logs yet!</div>
                        <div class="empty-body">Hit the ＋ Log Workout button to record your first session.</div>
                    </div>
                </template>
            </template>
        </div>

        <!-- ══ ADD LOG MODAL ══ -->
        <template lwc:if={showModal}>
            <div class="modal-overlay">
                <div class="modal-box">
                    <div class="modal-header">
                        <div class="modal-title">🏋️ Log Workout</div>
                        <button class="modal-close" onclick={closeModal}>✕</button>
                    </div>
                    <div class="modal-body">
                        <div class="field-row">
                            <label class="field-label">📅 Date <span class="required">*</span></label>
                            <input class="field-input" type="date" value={form.logDate}
                                data-field="logDate" onchange={handleFormChange}/>
                        </div>
                        <div class="field-row">
                            <label class="field-label">⏱️ Duration (minutes) <span class="required">*</span></label>
                            <input class="field-input" type="number" min="1" max="300"
                                placeholder="e.g. 60" value={form.duration}
                                data-field="duration" onchange={handleFormChange}/>
                        </div>
                        <div class="field-row">
                            <label class="field-label">💪 Workout Type</label>
                            <select class="field-input" value={form.workoutType}
                                data-field="workoutType" onchange={handleFormChange}>
                                <option value="">-- Select --</option>
                                <option value="Strength">💪 Strength</option>
                                <option value="Cardio">🏃 Cardio</option>
                                <option value="Yoga">🧘 Yoga</option>
                                <option value="Mixed">⚡ Mixed</option>
                                <option value="HIIT">🔥 HIIT</option>
                                <option value="Rest Day">😴 Rest Day</option>
                            </select>
                        </div>
                        <div class="field-row">
                            <label class="field-label">😊 Mood</label>
                            <div class="mood-grid">
                                <template for:each={moodOptions} for:item="m">
                                    <button key={m.value} class={m.cls}
                                        data-mood={m.value} onclick={handleMoodSelect}>
                                        {m.label}
                                    </button>
                                </template>
                            </div>
                        </div>
                        <div class="field-row">
                            <label class="field-label">📝 Comments</label>
                            <textarea class="field-textarea" rows="4"
                                placeholder="What did you work on? Any PRs today?"
                                value={form.comments} data-field="comments"
                                onchange={handleFormChange}></textarea>
                        </div>
                        <template lwc:if={formError}>
                            <div class="form-error">⚠️ {formError}</div>
                        </template>
                    </div>
                    <div class="modal-footer">
                        <button class="modal-cancel-btn" onclick={closeModal}>Cancel</button>
                        <button class="modal-save-btn" onclick={handleSave} disabled={isSaving}>
                            <template lwc:if={isSaving}>Saving...</template>
                            <template lwc:else>💾 Save Log</template>
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <!-- ══ DELETE CONFIRM MODAL ══ -->
        <template lwc:if={showDeleteModal}>
            <div class="modal-overlay">
                <div class="modal-box modal-small">
                    <div class="modal-header">
                        <div class="modal-title">🗑️ Delete Log</div>
                        <button class="modal-close" onclick={closeDeleteModal}>✕</button>
                    </div>
                    <div class="modal-body">
                        <div class="delete-confirm-text">
                            Are you sure you want to delete this workout log?
                            This cannot be undone.
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="modal-cancel-btn" onclick={closeDeleteModal}>Cancel</button>
                        <button class="modal-delete-btn" onclick={confirmDelete}>Yes, Delete</button>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
